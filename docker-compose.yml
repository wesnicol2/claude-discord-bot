services:
  claude-discord-bot:
    image: claude-discord-bot:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      tags:
        - claude-discord-bot:latest

    container_name: claude-discord-bot
    hostname: claude-discord-bot
    restart: unless-stopped

    # Run as root — required for Docker socket access and full filesystem ops
    user: "0:0"

    # ── Volume mounts ─────────────────────────────────────────────────────────
    volumes:
      # Full Unraid filesystem access
      - type: bind
        source: /mnt/user
        target: /mnt/user

      - type: bind
        source: /mnt/cache
        target: /mnt/cache

      - type: bind
        source: /boot
        target: /boot
        read_only: true

      # Docker socket — allows managing containers
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock

      # Bot application logs
      - type: bind
        source: ./logs
        target: /app/logs

      # Static config (tool allowlist) — read-only
      - type: bind
        source: ./config
        target: /config
        read_only: true

      # Share claude-home with the claude-code container so OAuth credentials
      # stay fresh — this instance refreshes them continuously during use
      - type: bind
        source: /mnt/user/appdata/claude-code/claude-home
        target: /home/node/.claude

    # ── Security ──────────────────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined

    # ── Resource limits ───────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
          pids: 200
        reservations:
          cpus: "0.1"
          memory: 128M

    # ── Environment ───────────────────────────────────────────────────────────
    env_file:
      - path: .env
        required: true

    environment:
      - NODE_ENV=production
      - WORKSPACE_PATH=/mnt/user
      - LOG_PATH=/app/logs
      - CONFIG_PATH=/config
      - CLAUDE_TELEMETRY_DISABLED=true
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - CLAUDE_TIMEOUT=${CLAUDE_TIMEOUT:-600}
      - HEARTBEAT_INTERVAL=${HEARTBEAT_INTERVAL:-120}
      - HEALTH_CHECK_INTERVAL=${HEALTH_CHECK_INTERVAL:-3600}
      - HEALTH_CHANNEL_ID=${HEALTH_CHANNEL_ID:-}
      - DISK_WARN_PCT=${DISK_WARN_PCT:-85}
      - DISK_CRIT_PCT=${DISK_CRIT_PCT:-95}
      - RADARR_URL=${RADARR_URL:-}
      - RADARR_API_KEY=${RADARR_API_KEY:-}
      - SONARR_URL=${SONARR_URL:-}
      - SONARR_API_KEY=${SONARR_API_KEY:-}
      - LIDARR_URL=${LIDARR_URL:-}
      - LIDARR_API_KEY=${LIDARR_API_KEY:-}
      - PROWLARR_URL=${PROWLARR_URL:-}
      - PROWLARR_API_KEY=${PROWLARR_API_KEY:-}
      - READARR_URL=${READARR_URL:-}
      - READARR_API_KEY=${READARR_API_KEY:-}

    # ── Logging ───────────────────────────────────────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # ── Network — default bridge so container can reach host services ─────────
    network_mode: bridge
